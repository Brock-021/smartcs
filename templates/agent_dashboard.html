<!DOCTYPE html>
<html lang="zh-CN"><meta http-equiv="Cache-Control" content="no-cache">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SmartCS">
<title>📋 客服工作台 - SmartCS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:500}
.header .user{display:flex;align-items:center;gap:8px;font-size:12px}
.header .user button{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px}
.header .user a{color:rgba(255,255,255,0.8);font-size:11px;text-decoration:none;padding:4px 8px;border-radius:5px;border:1px solid rgba(255,255,255,0.2)}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:300px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column}
.tabs{display:flex;border-bottom:2px solid #e0e0e0}
.tab{flex:1;text-align:center;padding:8px 4px;font-size:12px;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px;color:#666}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:500}
.tab .count{display:inline-block;background:#ff5252;color:#fff;font-size:10px;padding:0 5px;border-radius:8px;margin-left:3px}
.ticket-list{flex:1;overflow-y:auto}
.ticket{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
.ticket:hover{background:#f5f7fa}
.ticket.active{background:#e3f2fd;border-left:3px solid #1a73e8}
.ticket .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.ticket .customer{font-size:13px;font-weight:500;color:#333}
.ticket .ticket-no{font-size:10px;color:#999;font-family:monospace}
.ticket .badge{font-size:10px;padding:1px 6px;border-radius:4px;color:#fff}
.badge.open{background:#ff9800}
.badge.assigned{background:#1a73e8}
.badge.confirmed{background:#43a047}
.badge.closed{background:#999}
.ticket .preview{font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket .time{font-size:10px;color:#bbb;margin-top:2px}
.chat-area{flex:1;display:flex;flex-direction:column}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;flex-direction:column;gap:8px}
.placeholder .icon{font-size:40px}
.cust-info{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 16px;display:none;font-size:12px}
.cust-info .row{display:flex;gap:16px;flex-wrap:wrap}
.cust-info .item{color:#555}
.cust-info .item b{color:#333}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:#1a73e8;color:#fff;border-bottom-right-radius:3px}
.msg.bot{align-self:flex-start;background:#fff;color:#333;border-bottom-left-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
.msg.agent{align-self:flex-start;background:#e3f2fd;color:#1565c0;border-bottom-left-radius:3px;border-left:2px solid #1a73e8}
.msg .meta{font-size:10px;color:#999;margin-top:2px;display:block}
.reply-area{background:#fff;padding:8px 12px;border-top:1px solid #e0e0e0;display:none;gap:6px;align-items:flex-end}
.reply-area textarea{flex:1;border:1px solid #ddd;border-radius:16px;padding:7px 12px;font-size:13px;resize:none;max-height:50px;outline:none;font-family:inherit}
.reply-area textarea:focus{border-color:#1a73e8}
.reply-area button{background:#1a73e8;color:#fff;border:none;padding:7px 14px;border-radius:16px;cursor:pointer;font-size:12px;white-space:nowrap}
.reply-area button:disabled{opacity:.4}
.reply-area .btn-close{background:#43a047}
.close-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:center;justify-content:center}
.close-overlay.show{display:flex}
.close-modal{background:#fff;border-radius:14px;padding:24px;width:420px;max-width:92%}
.close-modal h3{font-size:16px;margin-bottom:8px}
.close-modal .reason-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.close-modal .reason-group label{display:flex;align-items:center;gap:4px;background:#f5f7fa;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:12px;border:1px solid #e0e0e0;transition:all .2s}
.close-modal .reason-group input[type="radio"]{display:none}
.close-modal .reason-group input[type="radio"]:checked + span{background:#1a73e8;color:#fff}
.close-modal .reason-group label:has(input:checked){background:#e3f2fd;border-color:#1a73e8;color:#1a73e8;font-weight:500}
.close-modal .reason-tag{font-size:12px}
.close-modal textarea{width:100%;height:80px;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:13px;resize:none;margin-bottom:10px;outline:none;font-family:inherit}
.close-modal textarea:focus{border-color:#1a73e8}
.close-modal .btns{display:flex;gap:8px;justify-content:flex-end}
.close-modal .btns button{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px}
.close-modal .btns .cancel{background:#f0f0f0;color:#333}
.close-modal .btns .confirm{background:#43a047;color:#fff}
.resolved-banner{background:#e8f5e9;color:#2e7d32;padding:6px 12px;font-size:12px;text-align:center;display:none}

/* 移动端返回按钮 */
.mobile-back{display:none;background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px 8px;margin-right:4px}

/* 客户信息可折叠面板 */
.cust-info-toggle{display:none;text-align:center;padding:4px;font-size:11px;color:#1a73e8;cursor:pointer;background:#e3f2fd;border-bottom:1px solid #bbdefb}
.cust-info-toggle:hover{background:#bbdefb}
.cust-info.collapsed .row{display:none}
.cust-info.collapsed .cust-info-toggle{display:block}

/* 下拉刷新提示 */
.agent-ptr{display:none;text-align:center;padding:8px;font-size:12px;color:#888}
.agent-ptr.show{display:block}
.agent-ptr .ptr-spin{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#1a73e8;border-radius:50%;animation:aptr-spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes aptr-spin{to{transform:rotate(360deg)}}

/* ===== 移动端响应式 (<768px) ===== */
@media(max-width:767px){
  .mobile-back{display:inline-block}
  .sidebar{width:100%;border-right:none;position:relative;z-index:10}
  .main{position:relative;overflow:hidden}
  .chat-area{position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;background:#fff;display:none;flex-direction:column}
  .chat-area.mobile-chat-open{display:flex}
  .chat-area .placeholder{font-size:14px}
  .sidebar .tabs .tab{padding:10px 4px;font-size:13px;min-height:44px;display:flex;align-items:center;justify-content:center}
  .sidebar .tabs .tab .count{font-size:11px;padding:0 6px}
  .ticket{padding:12px 14px;min-height:64px}
  .ticket .customer{font-size:14px}
  .ticket .preview{font-size:12px}
  .ticket .time{font-size:11px}
  .cust-info-toggle{display:block}
  .cust-info{padding:20px;max-height:60vh;overflow-y:auto}
  .cust-info .row{flex-direction:column;gap:6px}
  .cust-info .item{font-size:14px;padding:4px 0}
  .header{padding:8px 12px;padding-top:calc(8px + env(safe-area-inset-top,0px))}
  .header h1{font-size:14px}
  .header .user{font-size:11px;gap:4px}
  .header .user button,.header .user a{padding:6px 10px;min-height:44px;display:inline-flex;align-items:center}
  .reply-area{padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))}
  .reply-area textarea{font-size:16px;padding:9px 12px}
  .reply-area button{padding:10px 16px;min-height:44px}
  .chat-messages{padding:10px;gap:8px}
  .msg{font-size:14px;padding:10px 14px;max-width:90%}
  .close-modal{padding:20px;width:95%}
  .close-modal .reason-group label{padding:8px 14px;font-size:13px;min-height:44px;display:flex;align-items:center}
  .close-modal textarea{font-size:16px}
  .close-modal .btns button{padding:10px 24px;min-height:44px}
  /* 移动端顶部简洁导航 */
  .mobile-chat-header{display:flex;align-items:center;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);color:#fff;padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top,0px));display:none}
  .mobile-chat-header .back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;margin-right:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
  .mobile-chat-header .customername{flex:1;font-size:14px;font-weight:500}
  .mobile-chat-header .toggle-info{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;min-height:44px;display:flex;align-items:center}
}

/* iOS/Android 全面屏适配 */
@supports(padding:max(0px)){
  .main{padding-bottom:max(0px,env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div class="header">
  <h1>📋 客服工作台</h1>
  <div class="user">
    <span id="agentName">{{ agent_name }}</span>
    <script>
    window._isAdmin = {{ 'true' if agent_role == 'admin' else 'false' }};
    window._agentLevel = {{ agent_level }};
    </script>
    <a href="/admin/dashboard">⚙️ 后台管理</a>
    <button onclick="logout()">退出</button>
  </div>
</div>

<!-- 移动端聊天头部（返回按钮） -->
<div class="mobile-chat-header" id="mobileChatHeader" style="display:none">
  <button class="back-btn" onclick="mobileBackToList()">‹</button>
  <span class="customername" id="mobileCustomerName">客户</span>
  <button class="toggle-info" onclick="mobileToggleCustInfo()">📄 客户</button>
</div>

<!-- 下拉刷新指示器 -->
<div class="agent-ptr" id="agentPtr"><span class="ptr-spin"></span><span>刷新中...</span></div>
<div class="main">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" id="tabPending" onclick="switchTab('pending')">待处理 <span class="count" id="pendingCount">0</span></div>
      <div class="tab" id="tabMine" onclick="switchTab('mine')">我的客户</div>
      <div class="tab" id="tabHistory" onclick="switchTab('history')">历史工单</div>
    </div>
    <div class="ticket-list" id="ticketList"><div style="text-align:center;padding:30px;color:#999">加载中...</div></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="resolved-banner" id="resolvedBanner">✅ 该工单已解决/关闭
      <button class="reopen-btn" id="reopenBtn" onclick="reopenTicket()" style="display:none;margin-left:10px;background:#ff6f00;color:#fff;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px">↩ 重开工单</button>
    </div>
    <div class="placeholder" id="placeholder">
      <div class="icon">💬</div>
      <div>选择一个工单开始处理</div>
    </div>
    <div class="cust-info" id="custInfo">
      <div class="cust-info-toggle" onclick="toggleCustInfo(this)">▼ 点击查看/隐藏客户信息</div>
      <div class="row" id="custInfoRow"><span id="custInfoName" style="display:none"></span></div>
    </div>
    <div class="chat-messages" id="chatMessages" style="display:none"></div>
    <div class="reply-area" id="replyArea">
      <textarea id="replyInput" rows="1" placeholder="输入回复..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"></textarea>
      <button onclick="sendReply()" id="replyBtn">发送</button>
      <button onclick="showDefectDialog()" id="defectBtn" style="background:#e53935;color:#fff;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap">🔧 提交缺陷</button>
      <button onclick="requestAgentClose()" class="btn-close" id="closeBtn">✓ 请求关闭</button>
      <button onclick="showTransferDialog()" id="transferBtn" style="background:#e65100;color:#fff;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap">→ 转交</button>
    </div>
  </div>
</div>

<div class="close-overlay" id="transferDialog">
  <div class="close-modal">
    <h3>↔️ 转交工单</h3>
    <p style="font-size:12px;color:#666;margin-bottom:10px">选择接收该工单的客服或工程师：</p>
    <div id="transferAgentList" style="max-height:200px;overflow-y:auto;margin-bottom:10px">
      <div style="text-align:center;color:#999;padding:15px">加载中...</div>
    </div>
    <textarea id="transferNote" rows="2" placeholder="转交备注（选填，如：客户问题需要二线处理）" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px;resize:vertical"></textarea>
    <div class="btns">
      <button class="cancel" onclick="document.getElementById('transferDialog').classList.remove('show')">取消</button>
      <button class="confirm" onclick="confirmTransfer()" id="confirmTransferBtn" style="background:#e65100;color:#fff">确认转交</button>
    </div>
  </div>
</div>

<div class="close-overlay" id="defectDialog">
  <div class="close-modal">
    <h3>🔧 提交缺陷</h3>
    <p style="font-size:12px;color:#666;margin-bottom:10px">将当前工单问题提交到外部缺陷系统</p>
    <label style="display:block;font-size:12px;color:#888;margin-bottom:3px">选择外部系统</label>
    <select id="defectAdapterSelect" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:10px">
      <option value="">加载中...</option>
    </select>
    <label style="display:block;font-size:12px;color:#888;margin-bottom:3px">缺陷标题 <span style="color:#e53935">*</span></label>
    <input type="text" id="defectTitle" placeholder="请输入缺陷标题" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:10px">
    <label style="display:block;font-size:12px;color:#888;margin-bottom:3px">缺陷描述</label>
    <textarea id="defectDescription" rows="3" placeholder="缺陷描述（选填，默认使用工单问题描述）" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;resize:vertical;font-family:inherit;margin-bottom:10px"></textarea>
    <label style="display:block;font-size:12px;color:#888;margin-bottom:3px">优先级</label>
    <select id="defectPriority" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:10px">
      <option value="low">⬇️ 低</option>
      <option value="normal" selected>➡️ 普通</option>
      <option value="high">⬆️ 高</option>
      <option value="urgent">🔴 紧急</option>
    </select>
    <div class="btns">
      <button class="cancel" onclick="document.getElementById('defectDialog').classList.remove('show')">取消</button>
      <button class="confirm" onclick="submitDefect()" id="defectSubmitBtn" style="background:#e53935;color:#fff">🔧 提交缺陷</button>
    </div>
  </div>
</div>

<div class="close-overlay" id="closeDialog">
  <div class="close-modal">
    <h3>✏️ 关闭工单</h3>
    <p style="font-size:12px;color:#666;margin-bottom:10px">请选择关闭原因并填写备注：</p>
    <div class="reason-group" id="reasonGroup">
      <label><input type="radio" name="closeReason" value=""><span class="reason-tag">其他</span></label>
    </div>
    <textarea id="resolutionNotes" placeholder="请输入解决备注（如：已帮助客户完成XX操作，问题已解决）"></textarea>
    <div class="btns">
      <button class="cancel" onclick="document.getElementById('closeDialog').classList.remove('show')">取消</button>
      <button class="confirm" onclick="confirmFinalClose()">确认关闭</button>
    </div>
  </div>
</div>

<script>
var currentTicketId = null;
var currentConv = null;
var currentTab = 'pending';
var prevPendingCount = -1;
var convPollTimer = null;
var closeReasons = [];

// 请求通知权限
if (window.Notification && Notification.permission === 'default') {
  Notification.requestPermission();
}

// 加载关闭原因
function loadCloseReasons() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/admin/close-reasons', true);
  xhr.onload = function() {
    try {
      closeReasons = JSON.parse(xhr.responseText);
      var group = document.getElementById('reasonGroup');
      var html = '';
      html += '<label><input type="radio" name="closeReason" value=""><span class="reason-tag">不指定</span></label>';
      for (var i = 0; i < closeReasons.length; i++) {
        var r = closeReasons[i];
        html += '<label><input type="radio" name="closeReason" value="' + escapeHtml(r.name) + '"><span class="reason-tag">' + escapeHtml(r.name) + '</span></label>';
      }
      group.innerHTML = html;
    } catch(e) {}
  };
  xhr.send();
}

function timeAgo(t) {
  var now = new Date();
  var then = new Date(t.replace(' ','T'));
  var mins = Math.floor((now - then)/60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  var hrs = Math.floor(mins/60);
  mins = mins % 60;
  if (hrs < 24) return hrs + '小时' + mins + '分钟前';
  return t.substring(0,16);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  var idMap = {pending:'tabPending', mine:'tabMine', history:'tabHistory'};
  if(idMap[tab]) document.getElementById(idMap[tab]).classList.add('active');
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('chatMessages').style.display = 'none';
  document.getElementById('custInfo').style.display = 'none';
  document.getElementById('replyArea').style.display = 'none';
  document.getElementById('resolvedBanner').style.display = 'none';
  currentTicketId = null; currentConv = null;
  if (convPollTimer) { clearInterval(convPollTimer); convPollTimer = null; }
  loadTickets();
}

function loadTickets() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/agent/tickets?status=' + currentTab, true);
  xhr.onload = function() {
    if (xhr.status === 401) { window.location.href = '/agent/login'; return; }
    try {
      var d = JSON.parse(xhr.responseText);
      var list = document.getElementById('ticketList');
      if (currentTab === 'pending' && prevPendingCount >= 0 && d.length > prevPendingCount) {
        try {
          if (window.Notification && Notification.permission === 'granted') {
            new Notification('SmartCS 新工单', { body: '收到 ' + (d.length - prevPendingCount) + ' 个新工单' });
          }
          // 声音提醒
          try {
            var ctx = new (window.AudioContext||window.webkitAudioContext)();
            var osc = ctx.createOscillator(); var gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 660; osc.type = 'triangle';
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
            osc.start(); osc.stop(ctx.currentTime + 0.6);
          } catch(e){}
          document.title = '🔔 新工单';
          setTimeout(function(){ document.title = '📋 客服工作台'; }, 4000);
        } catch(e) {}
      }
      prevPendingCount = d.length;
      var pc = document.getElementById('pendingCount');
      if (pc) pc.textContent = d.length;
      if (!d || d.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:30px;color:#999;line-height:1.8">📭 暂无工单<br><span style="font-size:11px">等待新客户接入...</span></div>';
        return;
      }
      var html = '';
      var statusText = {open:'待处理', assigned:'处理中', confirmed:'待确认', closed:'已关闭', resolved:'已解决'};
      for (var i = 0; i < d.length; i++) {
        var t = d[i];
        var active = currentTicketId === t.id ? ' active' : '';
        var lastMsg = (t.last_msg || t.issue_description || '').substring(0, 50);
        var tkNo = t.ticket_number || ('#' + t.id.substring(0,8));
        var overdueBadge = t.overdue ? ' <span style="color:#ff1744;font-size:10px;font-weight:600">🔴 超时</span>' : '';
        html += '<div class="ticket' + active + '" onclick="selectTicket(\'' + t.id + '\',\'' + t.conversation_id + '\',\'' + t.status + '\')">' +
          '<div class="top"><span class="customer">' + escapeHtml(t.customer_name || '游客') + overdueBadge + '</span>' +
          '<span class="badge ' + t.status + '">' + (statusText[t.status] || t.status) + '</span></div>' +
          '<div class="ticket-no">' + tkNo + '</div>' +

function loadConversation(convId, tkId) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/agent/conversation/' + convId, true);
  xhr.onload = function() {
    try {
      var msgs = JSON.parse(xhr.responseText);
      var labels = {user:'用户', bot:'AI', agent:'客服', system:'系统'};
      var html = '';
      for (var i = 0; i < msgs.length; i++) {
        var m = msgs[i];
        var content = (m.content || '').replace(/</g,'&lt;').replace(/\n/g,'<br>');
        if (m.image_url) {
          content = '<img src="' + m.image_url + '" style="max-width:220px;border-radius:8px;cursor:pointer" onclick="window.open(this.src)">';
        }
        var cls = m.role === 'agent' ? 'agent' : m.role;
        var speaker = '';
        if (m.role === 'agent') speaker = getAgentName();
        else if (m.role === 'user') speaker = getCustomerName();
        else speaker = labels[m.role] || m.role;
        html += '<div class="msg ' + cls + '">' +
          '<div style="font-size:10px;color:#999;margin-bottom:2px">' + speaker + '</div>' +
          content +
          '<span class="meta">' + (labels[m.role] || m.role) + ' · ' + m.created_at + '</span></div>';
      }
      var container = document.getElementById('chatMessages');
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    } catch(e) {}
  };
  xhr.send();
  if (convPollTimer) clearInterval(convPollTimer);
  convPollTimer = setInterval(function() {
    if (!currentConv) { clearInterval(convPollTimer); convPollTimer = null; return; }
    loadConversationSilent(currentConv);
  }, 3000);
}

(function(){
  var ticketList = document.getElementById('ticketList');
  var ptr = document.getElementById('agentPtr');
  if (!ticketList || !ptr) return;
  var startY = 0, pulling = false;
  ticketList.addEventListener('touchstart', function(e) {
    if (ticketList.scrollTop <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, {passive: true});
  ticketList.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 40) { ptr.classList.add('show'); ptr.innerHTML = '<span class="ptr-spin"></span><span>松开刷新工单...</span>'; }
    else if (dy > 10) { ptr.classList.add('show'); ptr.innerHTML = '<span class="ptr-spin"></span><span>下拉刷新工单...</span>'; }
    else { ptr.classList.remove('show'); }
  }, {passive: true});
  ticketList.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    if (ptr.classList.contains('show')) {
      ptr.innerHTML = '<span class="ptr-spin"></span><span>刷新中...</span>';
      setTimeout(function(){ 
        loadTickets(); 
        setTimeout(function(){ ptr.classList.remove('show'); }, 500);
      }, 300);
    }
  }, {passive: true});
})();

function notifyNewTicket(title, body) {
  if (window.Notification && Notification.permission === 'granted') {
    new Notification(title, {body: body, icon: '/static/icon.png'});
  }
  // 声音
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 660; osc.type = 'triangle';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(); osc.stop(ctx.currentTime + 0.6);
  } catch(e){}
  // 标题闪烁
  document.title = '🔔 ' + title;
  setTimeout(function(){ document.title = origTitle; }, 4000);
}

      if (enabledDefectAdapters.length === 0) {
        sel.innerHTML = '<option value="">暂无可用缺陷系统，请在后台配置</option>';
        sel.disabled = true;
      } else {
        var html = '';
        for (var i = 0; i < enabledDefectAdapters.length; i++) {
          var a = enabledDefectAdapters[i];
          html += '<option value="' + a.id + '">' + escapeHtml(a.name) + ' (' + a.platform + ')</option>';
        }
        sel.innerHTML = html;
        sel.disabled = false;
      }
    } catch(e) {
      sel.innerHTML = '<option value="">加载失败</option>';
      console.error(e);
    }
  };
  xhr.onerror = function() {
    sel.innerHTML = '<option value="">网络错误</option>';
  };
  xhr.send();
  
  // Pre-fill default title
  var ticketInfo = document.querySelector('.ticket.active .customer');
  document.getElementById('defectTitle').value = '工单问题: ' + (ticketInfo ? ticketInfo.textContent.trim() : '');
  document.getElementById('defectDescription').value = '';
  document.getElementById('defectPriority').value = 'normal';
  document.getElementById('defectSubmitBtn').disabled = false;
  document.getElementById('defectSubmitBtn').textContent = '🔧 提交缺陷';
  
  document.getElementById('defectDialog').classList.add('show');
}

function submitDefect() {
  var adapterId = document.getElementById('defectAdapterSelect').value;
  var title = document.getElementById('defectTitle').value.trim();
  var description = document.getElementById('defectDescription').value.trim();
  var priority = document.getElementById('defectPriority').value;
  
  if (!adapterId) { alert('请选择外部系统'); return; }
  if (!title) { alert('请输入缺陷标题'); return; }
  
  var btn = document.getElementById('defectSubmitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 提交中...';
  
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/agent/tickets/' + currentDefectTicketId + '/create-defect', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    btn.disabled = false;
    btn.textContent = '🔧 提交缺陷';
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.ok) {
        document.getElementById('defectDialog').classList.remove('show');
        // Show success message
        var urlText = d.external_url ? '<a href="' + d.external_url + '" target="_blank" style="color:#1a73e8">' + d.external_id + '</a>' : d.external_id;
        alert('✅ 缺陷已提交！外部编号: ' + d.external_id);
        // Reload conversation to show system message
        if (currentTicketId && currentConv) {
          loadConversation(currentConv, currentTicketId);
          loadTicketExtLinks(currentTicketId);
        }
      } else {
        alert('提交失败: ' + (d.error || '未知错误'));
      }
    } catch(e) { alert('提交失败: ' + e.message); }
  };
  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = '🔧 提交缺陷';
    alert('网络错误');
  };
  xhr.send(JSON.stringify({
    adapter_id: adapterId,
    title: title,
    description: description,
    priority: priority
  }));
}

// SW 注册
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(e) { console.log('SW reg fail', e); });
}
</script>
