<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服登录 - SmartCS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:40px;width:380px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.card .icon{text-align:center;font-size:48px;margin-bottom:12px}
.card h2{text-align:center;font-size:20px;color:#333;margin-bottom:24px}
.card input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;transition:border .2s;margin-bottom:14px}
.card input:focus{border-color:#667eea}
.card button{width:100%;padding:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;transition:opacity .2s}
.card button:hover{opacity:.9}
.card button:disabled{opacity:.5}
.card .error{color:#d93025;font-size:13px;text-align:center;margin-top:10px;display:none}
.card .footer{text-align:center;margin-top:20px;font-size:12px;color:#999}
.card .footer a{color:#667eea;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">👤</div>
  <h2>客服工作台登录</h2>
  <input type="email" id="email" placeholder="邮箱" value="agent@smartcs.com">
  <input type="password" id="password" placeholder="密码" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()" id="loginBtn">登 录</button>
  <div class="error" id="errorMsg"></div>
  <div id="sso-section" style="display:none;margin-top:20px;border-top:1px solid #e0e0e0;padding-top:16px">
    <p style="font-size:13px;color:#666;text-align:center">或使用企业账号登录</p>
    <div id="sso-buttons"></div>
  </div>
  <div class="footer">
    <a href="/">返回客服首页</a>
  </div>
</div>

<!-- LDAP 登录弹窗 -->
<div class="modal-overlay" id="ldapModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:32px;width:360px;max-width:90%">
    <span style="font-size:20px;font-weight:600;display:block;margin-bottom:20px">🏢 LDAP 登录</span>
    <input type="text" id="ldapUsername" placeholder="用户名" style="width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;margin-bottom:14px">
    <input type="password" id="ldapPassword" placeholder="密码" style="width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;margin-bottom:14px" onkeydown="if(event.key==='Enter')ldapLogin()">
    <div style="display:none" id="ldapProviderId"></div>
    <div style="display:flex;gap:8px">
      <button onclick="closeLdapModal()" style="flex:1;padding:12px;background:#f0f0f0;color:#333;border:none;border-radius:10px;font-size:14px;cursor:pointer">取消</button>
      <button onclick="ldapLogin()" id="ldapLoginBtn" style="flex:2;padding:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">登 录</button>
    </div>
    <div id="ldapError" style="color:#d93025;font-size:13px;text-align:center;margin-top:10px;display:none"></div>
  </div>
</div>

<style>
.modal-overlay.show{display:flex !important}
.sso-btn{display:block;padding:12px;margin:8px 0;border-radius:10px;text-decoration:none;font-size:14px;text-align:center;transition:opacity .2s}
.sso-btn:hover{opacity:.85}
.sso-btn.oidc{background:#1a73e8;color:#fff}
.sso-btn.ldap{background:#f5f5f5;color:#333;border:1px solid #ddd;cursor:pointer}
</style>

<script>
// 页面加载时检查是否有 SSO 提供者
fetch('/api/auth/providers-enabled')
  .then(r => r.json())
  .then(providers => {
    if (providers.length > 0) {
      var section = document.getElementById('sso-section');
      section.style.display = 'block';
      var btns = document.getElementById('sso-buttons');
      for (var i = 0; i < providers.length; i++) {
        var p = providers[i];
        if (p.provider_type === 'oidc') {
          btns.innerHTML += '<a href="/api/auth/oidc/login/'+p.id+'" class="sso-btn oidc">🔑 SSO 登录 ('+p.name+')</a>';
        } else if (p.provider_type === 'ldap') {
          btns.innerHTML += '<a href="#" class="sso-btn ldap" onclick="showLdapForm(\''+p.id+'\',\''+p.name+'\')">🏢 LDAP 登录 ('+p.name+')</a>';
        }
      }
    }
  })
  .catch(function(){});

function showLdapForm(providerId, providerName) {
  document.getElementById('ldapProviderId').textContent = providerId;
  document.getElementById('ldapUsername').value = '';
  document.getElementById('ldapPassword').value = '';
  document.getElementById('ldapError').style.display = 'none';
  document.getElementById('ldapModal').classList.add('show');
  document.getElementById('ldapModal').querySelector('span').textContent = '🏢 LDAP 登录 - ' + providerName;
}

function closeLdapModal() {
  document.getElementById('ldapModal').classList.remove('show');
}

async function ldapLogin(){
  var btn=document.getElementById('ldapLoginBtn');btn.disabled=true;btn.textContent='登录中...';
  document.getElementById('ldapError').style.display='none';
  try{
    var r=await fetch('/api/auth/ldap/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        username:document.getElementById('ldapUsername').value,
        password:document.getElementById('ldapPassword').value,
        provider_id:document.getElementById('ldapProviderId').textContent
      })
    });
    var d=await r.json();
    if(d.ok){window.location.href=d.redirect}
    else{document.getElementById('ldapError').textContent=d.error||'登录失败';document.getElementById('ldapError').style.display='block'}
  }catch(e){document.getElementById('ldapError').textContent='网络错误';document.getElementById('ldapError').style.display='block'}
  btn.disabled=false;btn.textContent='登 录';
}

async function login(){
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='登录中...';
  document.getElementById('errorMsg').style.display='none';
  try{
    const r=await fetch('/agent/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})
    });
    const d=await r.json();
    if(d.ok){window.location.href=d.redirect}
    else{document.getElementById('errorMsg').textContent=d.error||'登录失败';document.getElementById('errorMsg').style.display='block'}
  }catch(e){document.getElementById('errorMsg').textContent='网络错误';document.getElementById('errorMsg').style.display='block'}
  btn.disabled=false;btn.textContent='登 录';
}
</script>
</body>
</html>
